<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Blackjack</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #035035;
            color: white;
            padding: 30px;
            max-width: 420px;
            margin: 0 auto;
        }
        h1 { color: gold; text-align: center; }
        #player-el { font-weight: bold; }
        #message-el { font-style: italic; min-height: 24px; }
        button {
            padding: 10px 18px;
            font-size: 16px;
            margin: 6px 6px 6px 0;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Blackjack</h1>

    <p id="player-el">Joueur : Akram 💰 200</p>

    <p id="message-el">Veux-tu jouer une partie ?</p>

    <p id="sum-el">Somme : </p>
    <p id="cards-el">Cartes : </p>

    <button id="start-btn">DÉMARRER</button>
    <button id="new-card-btn">NOUVELLE CARTE</button>

    <script src="index.js"></script>

</body>
</html>
