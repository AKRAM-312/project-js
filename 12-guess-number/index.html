<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devine le nombre</title>
    <style>
        body { font-family: Arial, sans-serif; background:#1e1b4b; color:white; text-align:center; max-width:400px; margin:0 auto; padding:30px; }
        h1 { font-size:22px; }
        input { font-size:20px; padding:10px; width:130px; text-align:center; border:none; border-radius:6px; }
        button { font-size:17px; padding:10px 18px; margin:8px 4px; border:none; border-radius:6px; cursor:pointer; background:#8b5cf6; color:white; font-weight:bold; }
        #message-el { font-size:19px; margin-top:20px; min-height:28px; }
        #tries-el { color:#a5b4fc; }
    </style>
</head>
<body>

    <h1>🔢 Devine le nombre (entre 1 et 100)</h1>

    <input type="number" id="guess-el" placeholder="Ton nombre">
    <button id="guess-btn">Deviner</button>
    <button id="reset-btn">Nouvelle partie</button>

    <p id="message-el"></p>
    <p id="tries-el"></p>

    <script src="index.js"></script>

</body>
</html>
